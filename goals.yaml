# ═══════════════════════════════════════
# 源码书籍生成 Harness — 通用质量与评估配置
# 项目特定配置（章节、书名等）请放在 projects/*.yaml 中
# ═══════════════════════════════════════

max_hours: 12
pass_threshold: 85

# ═══════════════════════════════════════
# 写作风格指南（适用于所有项目）
# ═══════════════════════════════════════
style:
  text_to_code_ratio: "70:30"  # 70% 文字，30% 代码
  words_per_chapter: "3000-5000"
  guidelines:
    - 70% 文字叙述 + 30% 关键代码（不要堆砌代码）
    - 每章以一个「问题」或「场景」开篇，引发好奇心
    - 用比喻解释复杂概念（如：Tool 系统像瑞士军刀）
    - 代码只展示最核心的 10-20 行，配详细注释
    - 每章结尾有「关键要点」总结和「延伸思考」
    - 章节间有承上启下的过渡

# ═══════════════════════════════════════
# 内容质量标准
# ═══════════════════════════════════════
quality:
  min_words_per_chapter: 3000
  max_words_per_chapter: 5000
  required_elements:
    - opening_hook        # 开篇引子（问题或场景）
    - analogy             # 至少一个比喻
    - architecture_diagram # Mermaid 架构/流程图
    - key_code_snippet    # 核心代码（10-20行，有注释）
    - design_rationale    # 设计决策的「为什么」
    - key_takeaways       # 章末要点总结
    - further_thinking    # 延伸思考问题

# ═══════════════════════════════════════
# 评分标准
# ═══════════════════════════════════════
evaluation:
  weights:
    chapter_coverage: 20    # 章节覆盖率
    content_depth: 25       # 每章 3000+ 字，有叙事
    readability: 20         # 文字 > 代码，有比喻有过渡
    visual_quality: 20      # 网页渲染效果(截图评估)
    interactivity: 15       # 导航、搜索、折叠、图表交互
